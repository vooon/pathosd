schema = "v1"

[router]
asn = 65001
router_id = "10.0.0.1"
local_address = "127.0.0.1"

[api]
listen = "127.0.0.1:59179"

[logging]
level = "info"
format = "text"

# OpenTelemetry export — traces, metrics and logs via OTLP.
# Transport is inferred from the URL scheme:
#   grpc://host:4317   gRPC plaintext    grpcs://host:4317  gRPC TLS
#   http://host:4318   OTLP/HTTP         https://host:4318  OTLP/HTTP TLS
# Set enabled = false (or remove endpoint) to disable entirely.
[otel]
endpoint = "grpc://otel-collector.example.com:4317"
# enabled = false
insecure = false
service_name = "pathosd"
# [otel.headers]
# x-honeycomb-team = "MY_API_KEY"

# Per-signal overrides (all optional — inherit global values when absent):
# [otel.traces]
# enabled = false

# [otel.metrics]
# endpoint = "http://prometheus-remote.example.com:4318"
# [otel.metrics.headers]
# x-scope-orgid = "my-tenant"

# [otel.logs]
# insecure = true

[bgp]
graceful_restart = true
hold_time = "90s"
keepalive_time = "30s"
listen_address = "127.0.0.1"
listen_port = 1179

[bgp.gobgp_api]
enabled = false
# listen = "127.0.0.1:50051"

[[bgp.neighbors]]
name = "frr-local"
address = "127.0.0.2"
peer_asn = 65000
required = true
port = 179
local_address = "127.0.0.1"
passive = false

# HTTP health check — full URL form
[[vips]]
name = "web-frontend"
prefix = "10.10.1.1/32"

  [vips.check]
  type = "http"
  interval = "2s"
  timeout = "500ms"
  rise = 3
  fall = 3

    [vips.check.http]
    url = "https://web.example.com/healthz"
    response_codes = [200]

  [vips.policy]
  fail_action = "withdraw"

# HTTP health check — path-only with JQ response match
[[vips]]
name = "api-backend"
prefix = "10.10.1.2/32"

  [vips.check]
  type = "http"
  interval = "3s"
  timeout = "1s"
  rise = 2
  fall = 3

    [vips.check.http]
    url = "/readyz"
    proto = "https"
    tls_insecure = true
    response_jq = ".ready == true"

  [vips.policy]
  fail_action = "withdraw"

# HTTP check — full URL with TLS cert verification via CA and curl --resolve
# semantics: connects to the VIP IP while verifying the cert against the
# hostname. tls_server_name defaults to the URL hostname automatically when
# the URL contains a non-IP hostname and host/port resolve to the VIP IP.
[[vips]]
name = "s3-backend"
prefix = "10.10.1.3/32"

  [vips.check]
  type = "http"
  interval = "10s"
  timeout = "5s"
  rise = 3
  fall = 3

    [vips.check.http]
    url = "https://s3.example.com/"
    response_codes = [200]
    tls_ca_cert = "/etc/pathosd/ca.crt"
    # tls_server_name = "s3.example.com"  # auto-defaulted from URL; set to override

  [vips.policy]
  fail_action = "withdraw"

# DNS health check — resolver defaults to VIP IP
[[vips]]
name = "dns-resolver"
prefix = "10.10.2.1/32"

  [vips.check]
  type = "dns"
  interval = "5s"
  timeout = "2s"
  rise = 2
  fall = 5

    [vips.check.dns]
    names = ["example.com", "test.example.com"]
    query_type = "A"

  [vips.policy]
  fail_action = "lower_priority"
  lower_priority_file = "/etc/pathosd/dns-resolver.drain"

    [vips.policy.lower_priority]
    as_path_prepend = 6
    communities = ["65001:666"]

# Ping health check
[[vips]]
name = "gateway-check"
prefix = "10.10.3.1/32"

  [vips.check]
  type = "ping"
  interval = "1s"
  timeout = "800ms"
  rise = 1
  fall = 3

    [vips.check.ping]
    dst_ip = "10.0.0.1"
    privileged = false # true = raw ICMP, requires root/CAP_NET_RAW
    count = 3
    timeout = "500ms"
    interval = "100ms"
    max_loss_ratio = 0.5

  [vips.policy]
  fail_action = "withdraw"

# TCP port reachability check
# (host defaults to VIP IP for /32 prefix)
[[vips]]
name = "tcp-service"
prefix = "10.10.4.1/32"

  [vips.check]
  type = "tcp"
  interval = "3s"
  timeout = "1s"
  rise = 2
  fall = 3

    [vips.check.tcp]
    port = 8080
    # host = "10.10.4.1"  # explicit host override

  [vips.policy]
  fail_action = "withdraw"

# UDP port reachability check — sends a probe datagram and waits for ICMP
# port-unreachable (ECONNREFUSED) to detect a closed port.
# (host defaults to VIP IP for /32 prefix)
[[vips]]
name = "udp-service"
prefix = "10.10.5.1/32"

  [vips.check]
  type = "udp"
  interval = "5s"
  timeout = "2s"
  rise = 2
  fall = 3

    [vips.check.udp]
    port = 514
    # payload = "\x00"   # probe payload; default is a single null byte
    # host = "10.10.5.1" # explicit host override

  [vips.policy]
  fail_action = "withdraw"
