apiVersion: v1
kind: Pod
metadata:
  name: frr
  namespace: pathosd-e2e
  labels:
    app: frr
spec:
  containers:
    - name: frr
      image: quay.io/frrouting/frr:10.3.1
      imagePullPolicy: IfNotPresent
      securityContext:
        capabilities:
          add: ["NET_ADMIN", "NET_RAW", "SYS_ADMIN"]
      ports:
        - name: bgp
          containerPort: 179
          protocol: TCP
      volumeMounts:
        - name: frr-config
          mountPath: /etc/frr/bgpd.conf
          subPath: bgpd.conf
        - name: frr-config
          mountPath: /etc/frr/daemons
          subPath: daemons
        - name: frr-config
          mountPath: /etc/frr/vtysh.conf
          subPath: vtysh.conf
  volumes:
    - name: frr-config
      configMap:
        name: frr-config
---
apiVersion: v1
kind: Service
metadata:
  name: frr
  namespace: pathosd-e2e
  labels:
    app: frr
spec:
  selector:
    app: frr
  ports:
    - name: bgp
      protocol: TCP
      port: 179
      targetPort: 179
