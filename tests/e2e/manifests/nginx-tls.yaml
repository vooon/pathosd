# nginx-tls: HTTPS backend for the https-vip e2e scenario.
#
# The server certificate is issued for CN=web.example.test with
# SAN=DNS:web.example.test.  pathosd connects to the Service ClusterIP (the
# VIP) while presenting "web.example.test" as the TLS SNI — exercising the
# tls_server_name / curl --resolve semantics.
#
# Certs were generated with:
#   openssl genrsa -out ca.key 2048
#   openssl req -new -x509 -days 3650 -key ca.key -out ca.crt -subj "/CN=pathosd-e2e-ca"
#   openssl genrsa -out server.key 2048
#   openssl req -new -key server.key -out server.csr -subj "/CN=web.example.test"
#   openssl x509 -req -days 3650 -in server.csr -CA ca.crt -CAkey ca.key \
#     -CAcreateserial -out server.crt \
#     -extfile <(printf 'subjectAltName=DNS:web.example.test')
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-tls-config
  namespace: pathosd-e2e
data:
  default.conf: |
    server {
        listen 443 ssl;
        ssl_certificate     /etc/nginx/tls/server.crt;
        ssl_certificate_key /etc/nginx/tls/server.key;
        location /healthz {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }
    }
