schema = "v1"

[router]
asn = 65001
router_id = "10.0.0.1"
local_address = "127.0.0.1"

[api]
listen = "127.0.0.1:59179"

[logging]
level = "info"
format = "text"

[bgp]
graceful_restart = true
hold_time = "90s"
keepalive_time = "30s"
listen_address = "127.0.0.1"
listen_port = 1179

[bgp.gobgp_api]
enabled = false
# listen = "127.0.0.1:50051"

[[bgp.neighbors]]
name = "frr-local"
address = "127.0.0.2"
peer_asn = 65000
required = true
port = 179
local_address = "127.0.0.1"
passive = false

# HTTP health check — full URL form
[[vips]]
name = "web-frontend"
prefix = "10.10.1.1/32"

  [vips.check]
  type = "http"
  interval = "2s"
  timeout = "500ms"
  rise = 3
  fall = 3

    [vips.check.http]
    url = "https://web.example.com/healthz"
    response_codes = [200]

  [vips.policy]
  fail_action = "withdraw"

# HTTP health check — path-only with JQ response match
[[vips]]
name = "api-backend"
prefix = "10.10.1.2/32"

  [vips.check]
  type = "http"
  interval = "3s"
  timeout = "1s"
  rise = 2
  fall = 3

    [vips.check.http]
    url = "/readyz"
    proto = "https"
    tls_insecure = true
    response_jq = ".ready == true"

  [vips.policy]
  fail_action = "withdraw"

# DNS health check — resolver defaults to VIP IP
[[vips]]
name = "dns-resolver"
prefix = "10.10.2.1/32"

  [vips.check]
  type = "dns"
  interval = "5s"
  timeout = "2s"
  rise = 2
  fall = 5

    [vips.check.dns]
    names = ["example.com", "test.example.com"]
    query_type = "A"

  [vips.policy]
  fail_action = "lower_priority"
  lower_priority_file = "/etc/pathosd/dns-resolver.drain"

    [vips.policy.lower_priority]
    as_path_prepend = 6
    communities = ["65001:666"]

# Ping health check
[[vips]]
name = "gateway-check"
prefix = "10.10.3.1/32"

  [vips.check]
  type = "ping"
  interval = "1s"
  timeout = "800ms"
  rise = 1
  fall = 3

    [vips.check.ping]
    dst_ip = "10.0.0.1"
    privileged = false # true = raw ICMP, requires root/CAP_NET_RAW
    count = 3
    timeout = "500ms"
    interval = "100ms"
    max_loss_ratio = 0.5

  [vips.policy]
  fail_action = "withdraw"
