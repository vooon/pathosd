apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-tls
  namespace: pathosd-e2e
  labels:
    app: nginx-tls
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-tls
  template:
    metadata:
      labels:
        app: nginx-tls
    spec:
      initContainers:
        # nginx refuses to start if the private key file is world-readable.
        # Copy the files out of the ConfigMap (0644) to a writable emptyDir
        # and restrict permissions before the main container starts.
        - name: fix-perms
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec"]
          args:
            - |
              cp /mnt/cm/server.crt /mnt/tls/server.crt
              cp /mnt/cm/server.key /mnt/tls/server.key
              chmod 0600 /mnt/tls/server.key
          volumeMounts:
            - name: nginx-tls-cm
              mountPath: /mnt/cm
            - name: tls-files
              mountPath: /mnt/tls
      containers:
        - name: nginx-tls
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 443
              name: https
          volumeMounts:
            - name: nginx-tls-config
              mountPath: /etc/nginx/conf.d
            - name: tls-files
              mountPath: /etc/nginx/tls
              readOnly: true
      volumes:
        - name: nginx-tls-config
          configMap:
            name: nginx-tls-config
            items:
              - key: default.conf
                path: default.conf
        - name: nginx-tls-cm
          configMap:
            name: nginx-tls-config
        - name: tls-files
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-tls
  namespace: pathosd-e2e
  labels:
    app: nginx-tls
spec:
  selector:
    app: nginx-tls
  ports:
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP
