apiVersion: v1
kind: ConfigMap
metadata:
  name: pathosd-config
  namespace: pathosd-e2e
data:
  pathosd.yaml: |
    schema: v1
    router:
      asn: 65100
      router_id: __POD_IP__
      local_address: __POD_IP__
    api:
      listen: ":59179"
    logging:
      level: debug
      format: text
    bgp:
      hold_time: 30s
      keepalive_time: 10s
      neighbors:
        - name: frr
          address: __FRR_SERVICE_HOST__
          peer_asn: 65200
          required: true
          port: 179
    vips:
      - name: web-vip
        prefix: 10.100.1.1/32
        check:
          type: http
          interval: 2s
          timeout: 1s
          rise: 3
          fall: 3
          http:
            url: /healthz
            host: nginx.pathosd-e2e.svc.cluster.local
            port: 80
            response_codes: [200]
        policy:
          fail_action: lower_priority
          lower_priority:
            as_path_prepend: 6
            communities: ["65100:666"]
      - name: dns-vip
        prefix: 10.100.2.1/32
        check:
          type: dns
          interval: 2s
          timeout: 1s
          rise: 3
          fall: 3
          dns:
            names: ["example.test."]
            resolver: coredns.pathosd-e2e.svc.cluster.local
            port: 53
            query_type: A
        policy:
          fail_action: withdraw
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pathosd
  namespace: pathosd-e2e
  labels:
    app: pathosd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pathosd
  template:
    metadata:
      labels:
        app: pathosd
    spec:
      initContainers:
        - name: wait-frr
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec"]
          args:
            - |
              i=0
              until nc -z -w 1 frr.pathosd-e2e.svc.cluster.local 179; do
                i=$((i+1))
                if [ "$i" -ge 120 ]; then
                  echo "timed out waiting for frr:179" >&2
                  exit 1
                fi
                sleep 1
              done
      containers:
        - name: pathosd
          image: pathosd:e2e
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec"]
          args:
            - |
              set -eu
              if [ -z "${FRR_SERVICE_HOST:-}" ]; then
                echo "FRR_SERVICE_HOST is not set" >&2
                exit 1
              fi

              cp /etc/pathosd-template/pathosd.yaml /tmp/pathosd.yaml
              sed -i "s/__POD_IP__/${POD_IP}/g" /tmp/pathosd.yaml
              sed -i "s/__FRR_SERVICE_HOST__/${FRR_SERVICE_HOST}/g" /tmp/pathosd.yaml

              exec /usr/local/bin/pathosd run --config /tmp/pathosd.yaml
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - containerPort: 59179
              name: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: 59179
            initialDelaySeconds: 2
            periodSeconds: 2
            timeoutSeconds: 1
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: 59179
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 6
          volumeMounts:
            - name: pathosd-config
              mountPath: /etc/pathosd-template
      volumes:
        - name: pathosd-config
          configMap:
            name: pathosd-config
---
apiVersion: v1
kind: Service
metadata:
  name: pathosd
  namespace: pathosd-e2e
  labels:
    app: pathosd
spec:
  selector:
    app: pathosd
  ports:
    - name: http
      port: 59179
      targetPort: 59179
      protocol: TCP
