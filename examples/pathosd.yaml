---
schema: v1

router:
  asn: 65001
  router_id: 10.0.0.1
  local_address: 127.0.0.1

api:
  listen: 127.0.0.1:59179

logging:
  level: info
  format: text

# OpenTelemetry export — traces, metrics and logs via OTLP.
# Transport is inferred from the URL scheme:
#   grpc://host:4317   gRPC plaintext    grpcs://host:4317  gRPC TLS
#   http://host:4318   OTLP/HTTP         https://host:4318  OTLP/HTTP TLS
# Set enabled: false (or remove endpoint) to disable entirely.
otel:
  endpoint: grpc://otel-collector.example.com:4317
  # enabled: false
  insecure: false
  service_name: pathosd
  # headers:
  #   x-honeycomb-team: MY_API_KEY
  # Per-signal overrides (all optional — inherit global values when absent):
  # traces:
  #   enabled: false
  # metrics:
  #   endpoint: http://prometheus-remote.example.com:4318
  #   headers:
  #     x-scope-orgid: my-tenant
  # logs:
  #   insecure: true

bgp:
  graceful_restart: true
  hold_time: 90s
  keepalive_time: 30s
  # pathosd listens on 1179, FRR stays on 179.
  listen_address: 127.0.0.1
  listen_port: 1179
  # Optional embedded GoBGP gRPC API for `gobgp` CLI debugging.
  gobgp_api:
    enabled: false
    # listen: 127.0.0.1:50051
  neighbors:
    # Active pathosd -> FRR localhost peering.
    - name: frr-local
      address: 127.0.0.2
      peer_asn: 65000
      required: true
      port: 179
      local_address: 127.0.0.1
      passive: false

vips:
  # HTTP health check — full URL form (proto, Host header, path derived from url)
  - name: web-frontend
    prefix: 10.10.1.1/32
    check:
      type: http
      interval: 2s
      timeout: 500ms
      rise: 3
      fall: 3
      http:
        url: https://web.example.com/healthz
        response_codes: [200]
    policy:
      fail_action: withdraw

  # HTTP health check — path-only form with JQ response match
  - name: api-backend
    prefix: 10.10.1.2/32
    check:
      type: http
      interval: 3s
      timeout: 1s
      rise: 2
      fall: 3
      http:
        url: /readyz
        response_jq: '.ready == true'
        tls_insecure: true
        proto: https
    policy:
      fail_action: withdraw

  # HTTP check — full URL with TLS cert verification via CA and curl --resolve
  # semantics: connects to the VIP IP while verifying the cert against the
  # hostname. tls_server_name defaults to the URL hostname automatically when
  # the URL contains a non-IP hostname and host/port resolve to the VIP IP.
  # Set it explicitly to override SNI or use a different name than the URL host.
  - name: s3-backend
    prefix: 10.10.1.3/32
    check:
      type: http
      interval: 10s
      timeout: 5s
      rise: 3
      fall: 3
      http:
        url: https://s3.example.com/
        response_codes: [200]
        tls_ca_cert: /etc/pathosd/ca.crt
        # tls_server_name: s3.example.com  # auto-defaulted from URL; set to override
    policy:
      fail_action: withdraw

  # DNS health check with lower_priority policy
  # (resolver defaults to VIP IP since prefix is /32)
  - name: dns-resolver
    prefix: 10.10.2.1/32
    check:
      type: dns
      interval: 5s
      timeout: 2s
      rise: 2
      fall: 5
      dns:
        names:
          - example.com
          - test.example.com
        query_type: A
    policy:
      fail_action: lower_priority
      lower_priority_file: /etc/pathosd/dns-resolver.drain
      lower_priority:
        as_path_prepend: 6
        communities:
          - "65001:666"

  # Ping health check
  - name: gateway-check
    prefix: 10.10.3.1/32
    check:
      type: ping
      interval: 1s
      timeout: 800ms
      rise: 1
      fall: 3
      ping:
        dst_ip: 10.0.0.1
        # Set true to use raw ICMP (requires root/CAP_NET_RAW). Default is false (UDP mode).
        privileged: false
        count: 3
        timeout: 500ms
        interval: 100ms
        max_loss_ratio: 0.5
    policy:
      fail_action: withdraw

  # TCP port reachability check
  # (host defaults to VIP IP for /32 prefix)
  - name: tcp-service
    prefix: 10.10.4.1/32
    check:
      type: tcp
      interval: 3s
      timeout: 1s
      rise: 2
      fall: 3
      tcp:
        port: 8080
        # host: 10.10.4.1   # explicit host override
    policy:
      fail_action: withdraw

  # UDP port reachability check — sends a probe datagram and waits for ICMP
  # port-unreachable (ECONNREFUSED) to detect a closed port.
  # (host defaults to VIP IP for /32 prefix)
  - name: udp-service
    prefix: 10.10.5.1/32
    check:
      type: udp
      interval: 5s
      timeout: 2s
      rise: 2
      fall: 3
      udp:
        port: 514
        # payload: "\x00"  # probe payload; default is a single null byte
        # host: 10.10.5.1  # explicit host override
    policy:
      fail_action: withdraw
