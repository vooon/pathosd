version: 2

project_name: pathosd

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: pathosd
    main: ./cmd/pathosd
    binary: pathosd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/prometheus/common/version.Version={{.Version}}
      - -X github.com/prometheus/common/version.Revision={{.Commit}}
      - -X github.com/prometheus/common/version.BuildDate={{.Date}}
      - -X github.com/prometheus/common/version.Branch={{.Tag}}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

nfpms:
  - id: pathosd-deb
    package_name: pathosd
    vendor: vooon
    homepage: https://github.com/vooon/pathosd
    maintainer: "pathosd contributors <pathosd@users.noreply.github.com>"
    description: |-
      Health-aware BGP VIP announcer.
      Announces VIPs via BGP (embedded GoBGP) based on configurable
      health check results (HTTP, DNS, TCP, ICMP ping).
    license: Apache 2.0
    formats:
      - deb
    bindir: /usr/bin
    section: net
    priority: optional
    contents:
      # systemd unit
      - src: packaging/systemd/pathosd.service
        dst: /lib/systemd/system/pathosd.service
      # declarative user/group creation (systemd-sysusers)
      - src: packaging/sysusers.d/pathosd.conf
        dst: /usr/lib/sysusers.d/pathosd.conf
      # declarative directory creation (systemd-tmpfiles)
      - src: packaging/tmpfiles.d/pathosd.conf
        dst: /usr/lib/tmpfiles.d/pathosd.conf
      # default config — not overwritten on upgrade
      - src: packaging/config/pathosd.toml
        dst: /etc/pathosd/pathosd.toml
        type: config|noreplace
    scripts:
      preinstall: packaging/scripts/preinstall.sh
      postinstall: packaging/scripts/postinstall.sh
      preremove: packaging/scripts/preremove.sh
      postremove: packaging/scripts/postremove.sh
    overrides:
      deb:
        dependencies:
          - systemd

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

dockers:
  - image_templates:
      - "ghcr.io/vooon/pathosd:{{ .Version }}-amd64"
    use: buildx
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
    goarch: amd64
  - image_templates:
      - "ghcr.io/vooon/pathosd:{{ .Version }}-arm64"
    use: buildx
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/vooon/pathosd:{{ .Version }}"
    image_templates:
      - "ghcr.io/vooon/pathosd:{{ .Version }}-amd64"
      - "ghcr.io/vooon/pathosd:{{ .Version }}-arm64"
  - name_template: "ghcr.io/vooon/pathosd:latest"
    image_templates:
      - "ghcr.io/vooon/pathosd:{{ .Version }}-amd64"
      - "ghcr.io/vooon/pathosd:{{ .Version }}-arm64"
