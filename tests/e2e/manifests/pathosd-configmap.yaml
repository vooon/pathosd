apiVersion: v1
kind: ConfigMap
metadata:
  name: pathosd-config
  namespace: pathosd-e2e
data:
  pathosd.yaml: |
    schema: v1
    router:
      asn: 65100
      router_id: __POD_IP__
      local_address: __POD_IP__
    api:
      listen: ":59179"
    logging:
      level: debug
      format: text
    bgp:
      hold_time: 30s
      keepalive_time: 10s
      neighbors:
        - name: frr
          address: __FRR_SERVICE_HOST__
          peer_asn: 65200
          required: true
          port: 179
    vips:
      - name: web-vip
        prefix: 10.100.1.1/32
        check:
          type: http
          interval: 2s
          timeout: 1s
          rise: 3
          fall: 3
          http:
            url: /healthz
            host: nginx.pathosd-e2e.svc.cluster.local
            port: 80
            response_codes: [200]
        policy:
          fail_action: lower_priority
          lower_priority:
            as_path_prepend: 6
            communities: ["65100:666"]
      - name: dns-vip
        prefix: 10.100.2.1/32
        check:
          type: dns
          interval: 2s
          timeout: 1s
          rise: 3
          fall: 3
          dns:
            names: ["example.test."]
            resolver: coredns.pathosd-e2e.svc.cluster.local
            port: 53
            query_type: A
        policy:
          fail_action: withdraw
