apiVersion: v1
kind: ConfigMap
metadata:
  name: frr-config
  namespace: pathosd-e2e
data:
  bgpd.conf: |
    frr version 10.3
    frr defaults traditional
    hostname frr
    log stdout informational

    router bgp 65200
     bgp router-id 10.200.0.1
     bgp listen range 10.42.0.0/16 peer-group pathosd
     neighbor pathosd peer-group
     neighbor pathosd remote-as 65100
     address-family ipv4 unicast
      neighbor pathosd activate
     exit-address-family
  vtysh.conf: |
    service integrated-vtysh-config
---
apiVersion: v1
kind: Pod
metadata:
  name: frr
  namespace: pathosd-e2e
  labels:
    app: frr
spec:
  containers:
    - name: frr
      image: quay.io/frrouting/frr:10.3.1
      imagePullPolicy: IfNotPresent
      command: ["/usr/lib/frr/bgpd"]
      args:
        - -f
        - /etc/frr/bgpd.conf
        - -A
        - 0.0.0.0
        - -p
        - "179"
        - -Z
      securityContext:
        capabilities:
          add: ["NET_ADMIN", "NET_RAW"]
      ports:
        - name: bgp
          containerPort: 179
          protocol: TCP
      readinessProbe:
        tcpSocket:
          port: 179
        initialDelaySeconds: 2
        periodSeconds: 2
        timeoutSeconds: 1
        failureThreshold: 30
      volumeMounts:
        - name: frr-config
          mountPath: /etc/frr/bgpd.conf
          subPath: bgpd.conf
        - name: frr-config
          mountPath: /etc/frr/vtysh.conf
          subPath: vtysh.conf
  volumes:
    - name: frr-config
      configMap:
        name: frr-config
---
apiVersion: v1
kind: Service
metadata:
  name: frr
  namespace: pathosd-e2e
  labels:
    app: frr
spec:
  selector:
    app: frr
  ports:
    - name: bgp
      protocol: TCP
      port: 179
      targetPort: 179
