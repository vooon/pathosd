apiVersion: v1
kind: ConfigMap
metadata:
  name: pathosd-config
  namespace: pathosd-e2e
data:
  pathosd.yaml: |
    schema: v1
    router:
      asn: 65100
      router_id: "%{POD_IP}"
      local_address: "%{POD_IP}"
    api:
      listen: ":59179"
    logging:
      level: debug
      format: text
    bgp:
      hold_time: 30s
      keepalive_time: 10s
      neighbors:
        - name: frr
          address: "%{FRR_PEER_IP}"
          peer_asn: 65200
          required: true
          port: 179
    vips:
      - name: web-vip
        prefix: 10.100.1.1/32
        check:
          type: http
          interval: 2s
          timeout: 1s
          rise: 3
          fall: 3
          http:
            url: /healthz
            host: nginx.pathosd-e2e.svc.cluster.local
            port: 80
            response_codes: [200]
        policy:
          fail_action: lower_priority
          lower_priority:
            as_path_prepend: 6
            communities: ["65100:666"]
      - name: dns-vip
        prefix: 10.100.2.1/32
        check:
          type: dns
          interval: 2s
          timeout: 1s
          rise: 3
          fall: 3
          dns:
            names: ["example.test."]
            resolver: coredns.pathosd-e2e.svc.cluster.local
            port: 53
            query_type: A
        policy:
          fail_action: withdraw
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pathosd
  namespace: pathosd-e2e
  labels:
    app: pathosd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pathosd
  template:
    metadata:
      labels:
        app: pathosd
    spec:
      initContainers:
        - name: wait-frr
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec"]
          args:
            - |
              set -eu
              peer_host="frr.pathosd-e2e.svc.cluster.local"
              i=0
              while :; do
                peer_ip="$(nslookup "${peer_host}" 2>/dev/null | awk '/^Address([[:space:]]+[0-9]+)?:/ {print $NF}' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | tail -n 1 || true)"
                if [ -n "${peer_ip}" ] && nc -z -w 1 "${peer_ip}" 179; then
                  printf '%s\n' "${peer_ip}" > /work/frr-peer-ip
                  exit 0
                fi
                i=$((i+1))
                if [ "$i" -ge 120 ]; then
                  echo "timed out waiting for frr bgp endpoint" >&2
                  exit 1
                fi
                sleep 1
              done
          volumeMounts:
            - name: runtime-data
              mountPath: /work
      containers:
        - name: pathosd
          image: pathosd:e2e
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec"]
          args:
            - |
              set -eu
              export FRR_PEER_IP="$(cat /work/frr-peer-ip 2>/dev/null || true)"
              if [ -z "${FRR_PEER_IP}" ]; then
                echo "FRR peer IP is not available" >&2
                exit 1
              fi

              exec /usr/local/bin/pathosd run --config /etc/pathosd/pathosd.yaml
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - containerPort: 59179
              name: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: 59179
            initialDelaySeconds: 2
            periodSeconds: 2
            timeoutSeconds: 1
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: 59179
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 6
          volumeMounts:
            - name: pathosd-config
              mountPath: /etc/pathosd
            - name: runtime-data
              mountPath: /work
      volumes:
        - name: pathosd-config
          configMap:
            name: pathosd-config
        - name: runtime-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: pathosd
  namespace: pathosd-e2e
  labels:
    app: pathosd
spec:
  selector:
    app: pathosd
  ports:
    - name: http
      port: 59179
      targetPort: 59179
      protocol: TCP
